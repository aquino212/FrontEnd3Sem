<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css ">
</head>

<body>
    <header class="header">
        <div class="container container--flex--collumn">
            <img class="header__logo" src="/images/logo tipo.png" alt="Logo">
            <h1 class="header__title">Contact Form</h1>
            <p class="header__text">Insira os dados do contato e clique em cadastrar!</p>
        </div>
    </header>

    <main>
        <div class="container">

            <form class="contact-form" action="">

                <div class="contact-form__linha">

                    <div class="contact-form__col-a">

                        <label for="nome">Nome</label>

                    </div>

                    <div class="context-form__col-b">

                        <input class="contact-form__input--metade contact-form__input" nome="nome" id="nome"
                            placeholder="Nome" type="text" />

                        <input class="contact-form__input--metade contact-form__input" nome="sobrenome" id="sobrenome"
                            placeholder="sobrenome" type="text" />
                    </div>
                </div>

                <div class="contact-form__linha">

                    <div class="contact-form__col-a">

                        <label for="email">Email</label>

                    </div>

                    <div class="context-form__col-b">

                        <input class="contact-form__input--inteiro contact-form__input" nome="email" id="email"
                            placeholder="email" type="email" />
                    </div>
                </div>

                <div class="contact-form__linha">

                    <div class="contact-form__col-a">

                        <label for="telefone">Telefone</label>

                    </div>

                    <div class="context-form__col-b">

                        <input class="contact-form__input--cep contact-form__input" nome="telefone" id="telefone"
                            placeholder="telefone" type="text" />

                        <input class="contact-form__input--rua contact-form__input" nome="ddd" id="ddd"
                            placeholder="DDD" type="text" />

                        <input class="contact-form__input--numero contact-form__input" nome="ex: 99999999" id=""
                            placeholder="Ex: 99999999" type="text" />

                        <input class="contact-form__input--3-3 contact-form__input" nome="ex: 99999999" id=""
                            placeholder="Ex: 99999999" type="text" />

                        <input class="contact-form__input--3-3 contact-form__input" nome="ex: 99999999" id=""
                            placeholder="Ex: 99999999" type="text" />

                        <input class="contact-form__input--3-3 contact-form__input" nome="ex: 99999999" id=""
                            placeholder="Ex: 99999999" type="text" />

                        <input class="contact-form__input--3-3 contact-form__input" nome="ex: 99999999" id=""
                            placeholder="Ex: 99999999" type="text" />
                    </div>
                </div>
                <div class="contact-form__linha">

                    <div class="contact-form__col-a">

                        <label for="telefone">Telefone</label>

                    </div>

                    <div class="context-form__col-b">

                        <input class="contact-form__input--3-3 contact-form__input" nome="telefone" id="telefone"
                            placeholder="telefone" type="text" />

                        <input class="contact-form__input--3-3 contact-form__input" nome="ddd" id="ddd"
                            placeholder="DDD" type="text" />

                        <input class="contact-form__input--3-3 contact-form__input" nome="ex: 99999999" id=""
                            placeholder="Ex: 99999999" type="text" />
                    </div>
                </div>
                


            </form>
        </div>
    </main>
</body>

</html>
